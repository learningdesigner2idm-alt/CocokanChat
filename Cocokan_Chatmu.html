/* ── APP ─────────────────────────────────────────── */
const App = () => {
  const [gameState, setGameState]         = useState('login');
  const [playerName, setPlayerName]       = useState('');
  const [selectedChar, setSelectedChar]   = useState(null);
  const [currentStepIdx, setCurrentStepIdx] = useState(0);
  const [chatHistory, setChatHistory]     = useState([]);
  const [isTyping, setIsTyping]           = useState(false);
  const [score, setScore]                 = useState(0);
  const [completedChars, setCompletedChars] = useState([]);
  const [isGameOver, setIsGameOver]       = useState(false);
  const [isSuccess, setIsSuccess]         = useState(false);
  const [pulangWarning, setPulangWarning] = useState(null);
  const scrollRef = useRef(null);

  const today = new Date().toLocaleDateString('id-ID', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  useEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [chatHistory, isTyping]);

  const handleChoice = (option) => {
    playSound('send');
    const newMsgs = [];
    if (option.type === 'action') {
      const dMatch = option.text.match(/[''"](.*?)[''""]/);
      if (dMatch) {
        const actionDesc = option.text.replace(/[''""].*?[''""]/,'').replace(/[:：]/g,'').trim();
        if (actionDesc) newMsgs.push({ type:'action_taken', text:actionDesc });
        newMsgs.push({ type:'user', text:dMatch[1] });
      } else {
        newMsgs.push({ type:'action_taken', text:option.text });
      }
    } else {
      newMsgs.push({ type:'user', text:option.text });
    }
    setChatHistory(prev => [...prev, ...newMsgs]);
    setIsTyping(true);
    setTimeout(() => {
      setIsTyping(false);
      playSound('receive');
      const charReply   = { type:'char',     text:option.reply                                   };
      const coachingMsg = { type:'coaching', text:option.coaching, isCorrect:option.isCorrect     };
      setChatHistory(prev => [...prev, charReply, coachingMsg]);
      if (option.isCorrect) {
        const nextStep = currentStepIdx + 1;
        if (nextStep < SCENARIOS[selectedChar.id].steps.length) {
          setCurrentStepIdx(nextStep);
        } else {
          setScore(prev => prev + 25);
          setCompletedChars(prev => [...prev, selectedChar.id]);
          setIsSuccess(true);
          setIsGameOver(true);
          playSound('win');
        }
      } else {
        setIsSuccess(false);
        setIsGameOver(true);
        playSound('fail');
      }
    }, 1200);
  };

  const startChat = (char) => {
    playSound('click');
    setSelectedChar(char);
    setCurrentStepIdx(0);
    setChatHistory([{ type:'system', text:`Misi Koordinasi: ${char.name}` }]);
    setGameState('chat');
    setIsGameOver(false);
    setIsSuccess(false);
  };

  const handlePulangClick = () => {
    const remaining = CHARACTERS.filter(c => !completedChars.includes(c.id));
    if (remaining.length > 0) {
      playSound('fail');
      setPulangWarning(`Eits! Kamu belum bisa pulang. Kamu belum menyelesaikan koordinasi dengan: ${remaining.map(c=>c.name).join(', ')}. Selesaikan dulu ya!`);
    } else {
      playSound('win');
      setGameState('end');
    }
  };

  /* ── LOGIN ─── */
  if (gameState === 'login') return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-sky-100 flex items-center justify-center p-4 overflow-hidden relative">
      <div className="absolute top-[-10%] left-[-10%] w-72 h-72 bg-indigo-200 rounded-full blur-[100px] opacity-40"></div>
      <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-sky-200 rounded-full blur-[100px] opacity-40"></div>
      <div className="max-w-md w-full z-10 animate-in fade-in zoom-in duration-700">
        <div className="bg-white p-8 sm:p-12 rounded-[3rem] shadow-[0_20px_60px_rgba(0,0,0,0.08)] border-2 border-white relative overflow-hidden text-center text-slate-800">
          <div className="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-sky-400"></div>
          <div className="bg-indigo-50 w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-sm text-indigo-600">
            <Building2 size={40} />
          </div>
          <h1 className="text-3xl font-black mb-2 tracking-tight uppercase">Cocokan Chatmu</h1>
          <p className="text-slate-500 font-bold text-sm mb-10 tracking-widest uppercase opacity-70">Masuk untuk Memulai Sesi</p>
          <div className="space-y-6 text-left text-slate-800">
            <div className="space-y-2">
              <label className="text-[10px] font-black text-indigo-600 uppercase tracking-widest ml-1">Masukan Nama Lengkap</label>
              <div className="relative group">
                <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                  <User size={20} />
                </div>
                <input type="text" value={playerName} onChange={e => setPlayerName(e.target.value)}
                  onKeyDown={e => e.key==='Enter' && playerName.trim() && (playSound('click'), setGameState('intro'))}
                  placeholder="Nama Kamu..."
                  className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-4 pl-12 pr-4 font-bold text-slate-700 focus:bg-white focus:border-indigo-500 focus:outline-none transition-all placeholder:text-slate-300"/>
              </div>
            </div>
            <button disabled={!playerName.trim()} onClick={() => { playSound('click'); setGameState('intro'); }}
              className={`w-full py-5 rounded-[1.5rem] font-black text-xl transition-all shadow-xl flex items-center justify-center gap-3 active:scale-95 ${playerName.trim() ? 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-indigo-100' : 'bg-slate-100 text-slate-400 cursor-not-allowed shadow-none'}`}>
              MASUK KANTOR <ChevronRight size={24} />
            </button>
          </div>
          <div className="mt-8 flex items-center justify-center gap-2 text-slate-300">
            <Lock size={12} />
            <span className="text-[10px] font-black uppercase tracking-[0.2em]">Secure Session • 2025</span>
          </div>
        </div>
      </div>
    </div>
  );

  /* ── INTRO ─── */
  if (gameState === 'intro') return (
    <div className="min-h-screen bg-gradient-to-br from-amber-50 via-white to-sky-100 flex items-center justify-center p-4 sm:p-8 overflow-hidden relative">
      <div className="max-w-4xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center z-10 animate-in fade-in slide-in-from-bottom-10 duration-1000 text-slate-800">
        <div className="text-left space-y-6 px-4">
          <div className="inline-flex items-center gap-2 bg-white/90 border border-amber-200 px-4 py-2 rounded-full text-amber-700 text-sm font-bold uppercase tracking-widest shadow-sm">
            <Sparkles size={16} className="text-amber-500" /> LMS Interactive Learning
          </div>
          <h1 className="text-5xl sm:text-7xl font-black text-slate-800 leading-[0.95] tracking-tighter">
            COCOKAN <br/><span className="text-transparent bg-clip-text bg-gradient-to-r from-sky-500 to-indigo-600">CHATMU.</span>
          </h1>
          <p className="text-slate-500 text-lg sm:text-xl font-bold leading-relaxed max-w-md">
            Halo <span className="text-indigo-600 font-black">{playerName}</span>! Asah ketajaman radarmu untuk berkolaborasi tanpa hambatan di lingkungan kantor.
          </p>
        </div>
        <div className="relative px-2">
          <div className="bg-white p-8 sm:p-10 rounded-[2.5rem] border-2 border-white shadow-[0_30px_60px_rgba(0,0,0,0.06)] relative overflow-hidden text-slate-800">
            <div className="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-sky-400 to-indigo-500"></div>
            <div className="flex items-center justify-between mb-10">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 bg-indigo-50 rounded-2xl flex items-center justify-center border border-indigo-100 shadow-sm text-indigo-600"><Calendar size={24}/></div>
                <div>
                  <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest leading-none mb-1">Status Hari Ini</p>
                  <p className="text-slate-800 font-black text-base">{today}</p>
                </div>
              </div>
              <div className="px-3 py-1 bg-sky-50 text-sky-600 rounded-full text-[10px] font-black uppercase tracking-wider">Aktif</div>
            </div>
            <div className="space-y-8">
              <div className="space-y-4">
                <h3 className="text-slate-800 text-2xl font-black tracking-tight">Tantangan Kantor</h3>
                <p className="text-sm leading-relaxed text-slate-500">Meja kerjamu sudah menanti. Kopi masih hangat, namun deretan tugas mulai masuk. Berbagai karakter rekan kerja menunggu cara komunikasimu yang paling taktis.</p>
              </div>
              <button onClick={() => { playSound('click'); setGameState('home'); }}
                className="group w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[1.5rem] font-black text-xl transition-all shadow-xl active:scale-95 flex items-center justify-center gap-3">
                MULAI SESI <ChevronRight size={24} className="group-hover:translate-x-1 transition-transform"/>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );

  /* ── HOME ─── */
  if (gameState === 'home') return (
    <div className="min-h-screen bg-gradient-to-br from-sky-50 via-white to-amber-50 px-4 py-8 sm:py-16 fade-in relative overflow-hidden text-slate-800">
      {pulangWarning && (
        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-in fade-in">
          <div className="bg-white p-8 rounded-[2.5rem] shadow-2xl border-4 border-rose-100 max-w-sm w-full text-center animate-shake relative text-slate-800">
            <button onClick={() => { playSound('click'); setPulangWarning(null); }} className="absolute top-4 right-4 p-2 hover:bg-slate-100 rounded-full transition-colors text-slate-400"><X size={20}/></button>
            <div className="bg-rose-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner text-rose-500"><AlertCircle size={32}/></div>
            <h3 className="text-xl font-black mb-3 uppercase tracking-tight">Belum Bisa Pulang!</h3>
            <p className="text-slate-500 font-bold leading-relaxed mb-6">{pulangWarning}</p>
            <button onClick={() => { playSound('click'); setPulangWarning(null); }} className="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white rounded-2xl font-black text-lg transition-all active:scale-95 shadow-lg shadow-rose-200">OKE, SIAP!</button>
          </div>
        </div>
      )}
      <header className="text-center mb-12 relative z-10">
        <h1 className="text-4xl sm:text-6xl font-black mb-3 tracking-tighter uppercase">
          COCOKAN <span className="text-transparent bg-clip-text bg-gradient-to-r from-sky-500 to-indigo-600">CHATMU</span>
        </h1>
        <p className="text-slate-500 font-black text-lg sm:text-xl italic max-w-2xl mx-auto">
          "Halo <span className="text-indigo-600 not-italic font-black">{playerName}</span>! Selamat bekerja, pilih rekan koordinasimu dulu!"
        </p>
        <div className="mt-10 flex justify-center gap-4 sm:gap-6">
          <div className="bg-white px-5 py-3 rounded-[1.5rem] shadow-sm border-2 border-slate-50 flex items-center gap-3 hover:scale-105 transition-transform">
            <div className="bg-amber-100 p-2 rounded-xl text-amber-500"><Trophy size={24}/></div>
            <span className="font-black text-2xl">{score}</span>
          </div>
          <div className="bg-white px-5 py-3 rounded-[1.5rem] shadow-sm border-2 border-slate-50 flex items-center gap-3 hover:scale-105 transition-transform text-indigo-500">
            <CheckCircle2 size={24}/>
            <span className="font-black text-2xl text-slate-800">{completedChars.length}/4</span>
          </div>
        </div>
      </header>
      <div className="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8 relative z-10 px-4 mb-16 text-slate-800">
        {CHARACTERS.map((char) => {
          const theme = getCharacterTheme(char.color);
          const isDone = completedChars.includes(char.id);
          return (
            <button key={char.id} onClick={() => !isDone && startChat(char)}
              className={`relative group p-8 rounded-[3rem] border-4 transition-all flex flex-col items-center text-center gap-5 ${
                isDone ? 'bg-white/60 border-slate-100 opacity-80 cursor-default shadow-none'
                : `bg-white border-white ${theme.border} shadow-[0_15px_40px_rgba(0,0,0,0.06)] hover:shadow-[0_25px_50px_rgba(0,0,0,0.1)] hover:-translate-y-4 hover:rotate-2 active:scale-95`
              }`}>
              <div className="transition-transform group-hover:scale-110 duration-500">{char.avatar}</div>
              <div className="space-y-1 text-slate-700">
                <h3 className="text-2xl font-black">{char.name}</h3>
                <div className={`inline-block px-3 py-1 rounded-full font-black text-[10px] tracking-widest uppercase border ${theme.badge}`}>{char.role}</div>
              </div>
              {isDone
                ? <div className="absolute -top-4 -right-4 bg-yellow-400 text-white p-3 rounded-2xl shadow-lg border-4 border-white rotate-12 animate-in zoom-in-50"><Star size={24} fill="white"/></div>
                : <div className={`mt-2 w-10 h-10 rounded-2xl bg-slate-50 flex items-center justify-center text-slate-300 ${theme.iconBtn} group-hover:text-white transition-all shadow-sm`}><ChevronRight size={24}/></div>
              }
            </button>
          );
        })}
      </div>
      <div className="max-w-6xl mx-auto flex justify-center relative z-10">
        <button onClick={handlePulangClick} className="group flex items-center gap-3 bg-white px-8 py-4 rounded-full border-2 border-slate-200 shadow-md hover:border-rose-400 hover:shadow-rose-100 transition-all active:scale-95 text-slate-800">
          <div className="bg-rose-50 p-2 rounded-full group-hover:bg-rose-500 transition-colors text-rose-500 group-hover:text-white"><LogOut size={20}/></div>
          <span className="font-black text-slate-600 group-hover:text-rose-600 transition-colors tracking-tight uppercase text-xs">Langsung Pulang Kerja</span>
        </button>
      </div>
    </div>
  );

  /* ── CHAT ─── */
  if (gameState === 'chat') {
    const scenario = SCENARIOS[selectedChar.id];
    const currentStep = scenario.steps[currentStepIdx];
    return (
      <div className="max-w-md mx-auto h-screen flex flex-col bg-white shadow-2xl overflow-hidden sm:rounded-[2.5rem] sm:border-8 sm:border-slate-800 relative animate-in slide-in-from-bottom-10 duration-500 text-slate-800">
        {/* Header */}
        <div className="bg-white p-4 text-slate-800 flex items-center justify-between shadow-sm z-20 shrink-0 border-b border-slate-100">
          <div className="flex items-center gap-3 text-slate-800">
            <button onClick={() => { playSound('click'); setGameState('home'); }} className="p-2 hover:bg-slate-50 rounded-full transition-colors text-slate-400"><ArrowLeft size={20}/></button>
            <div className="relative">{selectedChar.mini}<div className="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div></div>
            <div>
              <h2 className="font-black leading-tight text-sm sm:text-base text-slate-800">{selectedChar.name}</h2>
              <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Online • {selectedChar.role}</p>
            </div>
          </div>
          <div className="flex gap-4 text-slate-300"><Video size={20} className="hidden sm:block"/><Phone size={20}/><MoreVertical size={20}/></div>
        </div>
        {/* Messages */}
        <div ref={scrollRef} className="flex-1 p-4 overflow-y-auto space-y-4 bg-[#f8fafc] pattern-dots">
          {chatHistory.map((msg, i) => (
            <div key={i} className={`flex ${msg.type==='user' ? 'justify-end' : msg.type==='action_taken' ? 'justify-center' : 'justify-start'} animate-in slide-in-from-bottom-2`}>
              {msg.type==='system'      && <div className="mx-auto bg-sky-100 text-sky-700 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-wider mb-4 shadow-sm border border-sky-200">{msg.text}</div>}
              {msg.type==='action_taken'&& <div className="mx-auto bg-amber-100 text-amber-800 px-6 py-2 rounded-xl text-xs font-black italic shadow-sm border border-amber-200 flex items-center gap-2 text-center leading-tight max-w-[90%]"><Hand size={12}/>{msg.text}</div>}

                <div className={`mt-2 w-full flex flex-col items-center gap-2 ${msg.isCorrect ? 'text-emerald-700' : 'text-rose-700'}`}>
                  <div className={`px-5 py-4 rounded-2xl border-2 flex items-start gap-3 text-xs font-black w-full shadow-md ${msg.isCorrect ? 'bg-emerald-50 border-emerald-200' : 'bg-rose-50 border-rose-200'}`}>

                </div>

                <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce"></div>
                <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce delay-75"></div>
                <div className="w-2 h-2 bg-slate-300 rounded-full animate-bounce delay-150"></div>
              </div>
            </div>

            <div className="space-y-4">

                  return (
                    <button key={i} onClick={() => handleChoice(opt)}
                      className={`w-full text-left p-5 rounded-2xl border-2 transition-all text-xs font-black leading-tight flex items-center justify-between group active:scale-95 shadow-sm ${
                        isChatMode
                          ? 'border-indigo-100 bg-white hover:border-indigo-500 hover:bg-indigo-50 text-indigo-900'
                          : 'border-amber-200 bg-amber-50 hover:border-amber-500 hover:bg-amber-100 text-amber-900'
                      }`}>
                      <span className="flex-1">{opt.text}</span>
                      <div className={`p-2 rounded-xl transition-colors shrink-0 ml-2 ${isChatMode ? 'bg-indigo-100 group-hover:bg-indigo-500 text-indigo-600' : 'bg-amber-100 group-hover:bg-amber-500 text-amber-600'}`}>
                        {isChatMode ? <Send size={16} className="group-hover:text-white"/> : <Zap size={16} className="group-hover:text-white"/>}
                      </div>
                    </button>
                  );
                })}
              </div>
            </div>
          ) : isGameOver ? (
            <div className="text-center p-4 animate-in zoom-in-95">
              <h3 className={`font-black text-2xl mb-4 tracking-tight ${isSuccess ? 'text-emerald-600' : 'text-rose-600'}`}>
                {isSuccess ? 'KOORDINASI MANTAP!' : 'MISI TERHAMBAT!'}
              </h3>
              <button onClick={() => { playSound('click'); isSuccess ? setGameState('home') : startChat(selectedChar); }}
                className={`w-full py-5 rounded-[1.5rem] text-white font-black text-lg shadow-xl transition-all active:scale-95 ${
                  isSuccess ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100' : 'bg-rose-500 hover:bg-rose-600 shadow-rose-100'
                }`}>
                {isSuccess ? 'Lanjut Cari Rekan' : 'Coba Lagi Sesi Ini'}
              </button>
            </div>
          ) : (
            <div className="h-14 flex items-center justify-center text-slate-300 italic text-sm font-black animate-pulse">
              {selectedChar.name} sedang mengetik balasan...
            </div>
          )}
        </div>
      </div>
    );
  }

  /* ── END ─── */
  if (gameState === 'end') return (
    <div className="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-600 to-rose-500 flex items-center justify-center p-6 sm:p-10 fade-in overflow-hidden relative">
      <div className="bg-white p-10 sm:p-16 rounded-[4rem] shadow-2xl text-center max-w-2xl w-full border-b-[12px] border-indigo-200 relative z-10 animate-in zoom-in-90 text-slate-800">
        <div className="bg-yellow-100 w-24 h-24 rounded-3xl flex items-center justify-center mx-auto mb-8 -rotate-12 shadow-lg text-yellow-600"><Trophy size={48}/></div>
        <h2 className="text-4xl sm:text-5xl font-black mb-6 tracking-tighter uppercase">MISI SELESAI!</h2>
        <p className="text-2xl sm:text-3xl text-indigo-600 font-black italic leading-tight mb-10">
          "Hore {playerName}! Akhirnya kamu bisa pulang kerja dengan bahagia tanpa banyak drama."
        </p>
        <div className="p-6 bg-slate-50 rounded-3xl mb-10 border-2 border-indigo-50">
          <p className="text-slate-500 font-bold text-slate-700">Skor Akhirmu: <span className="text-indigo-600 text-3xl font-black">{score}</span></p>
        </div>
        <button onClick={() => window.location.reload()}
          className="px-14 py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-[2.5rem] font-black text-xl shadow-2xl transition-all hover:scale-105 active:scale-95 uppercase tracking-widest">
          MAIN LAGI
        </button>
      </div>
    </div>
  );

  return null;
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
